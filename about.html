    <style>
        /* ===== CSS Reset ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* ===== Root & Typography ===== */
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f5f0e8;
            color: #1a1a1a;
            line-height: 1.6;
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        h1 {
            font-size: clamp(2.4rem, 6vw, 4.2rem);
            line-height: 1.1;
            margin-bottom: 1.2rem;
        }
        h2 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            margin-bottom: 1rem;
            border-left: 6px solid #d4af37;
            padding-left: 0.8rem;
        }
        h3 {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-bottom: 0.6rem;
        }
        p {
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        a {
            color: #1a1a1a;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        a:hover {
            background-color: #d4af37;
            color: #1a1a1a;
            text-decoration: none;
        }
        /* ===== Borders & Boxes ===== */
        .brutal-border {
            border: 4px solid #1a1a1a;
            padding: 1rem;
        }
        .brutal-border-accent {
            border: 4px solid #d4af37;
            padding: 1rem;
            background-color: #fffae6;
        }
        .brutal-border-double {
            border: 6px double #1a1a1a;
            padding: 1.2rem;
        }
        .brutal-shadow {
            box-shadow: 8px 8px 0 #1a1a1a;
        }
        .brutal-shadow-accent {
            box-shadow: 8px 8px 0 #d4af37;
        }
        /* ===== Layout ===== */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #1a1a1a;
            color: #f5f0e8;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .logo a {
            color: #f5f0e8;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background-color: transparent;
        }
        header .logo a:hover {
            background-color: #d4af37;
            color: #1a1a1a;
        }
        /* ===== Navigation ===== */
        nav {
            display: flex;
            align-items: center;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 1rem;
        }
        nav a {
            color: #f5f0e8;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border: 2px solid transparent;
            transition: all 0.15s;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        nav a:hover, nav a.active {
            border-color: #d4af37;
            background-color: transparent;
            color: #d4af37;
        }
        nav a[aria-current="page"] {
            background-color: #d4af37;
            color: #1a1a1a;
            border-color: #d4af37;
        }
        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.4rem;
        }
        .hamburger-menu span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: #f5f0e8;
            margin: 4px 0;
            transition: 0.2s;
        }
        /* ===== Hero ===== */
        .hero {
            background-color: #1a1a1a;
            color: #f5f0e8;
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 6px solid #d4af37;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: clamp(2.8rem, 8vw, 5rem);
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto;
        }
        /* ===== Content sections ===== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.2rem;
        }
        .section {
            margin-bottom: 3rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
        }
        .card {
            border: 4px solid #1a1a1a;
            padding: 1.2rem;
            background-color: #fff;
            transition: all 0.2s;
        }
        .card:hover {
            box-shadow: 6px 6px 0 #1a1a1a;
            transform: translate(-2px, -2px);
        }
        .card h3 {
            border-bottom: 3px solid #d4af37;
            padding-bottom: 0.4rem;
            margin-bottom: 0.6rem;
        }
        .card .meta {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
            margin-bottom: 0.5rem;
        }
        .list-block {
            border-top: 4px solid #1a1a1a;
            border-bottom: 4px solid #1a1a1a;
            padding: 1.2rem 0;
            margin-bottom: 1.5rem;
        }
        .list-block dt {
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 0.8rem;
            border-left: 4px solid #d4af37;
            padding-left: 0.8rem;
        }
        .list-block dd {
            margin-left: 1.2rem;
            margin-bottom: 0.4rem;
        }
        /* ===== FAQ accordion (simple) ===== */
        .faq-item {
            border-bottom: 2px solid #ccc;
            padding: 1rem 0;
        }
        .faq-question {
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1.1rem;
            position: relative;
            padding-right: 2rem;
        }
        .faq-question::after {
            content: '▾';
            position: absolute;
            right: 0;
            top: 0;
        }
        .faq-answer {
            margin-top: 0.8rem;
            padding-left: 1.2rem;
            border-left: 4px solid #d4af37;
        }
        /* ===== Footer ===== */
        footer {
            background-color: #1a1a1a;
            color: #f5f0e8;
            padding: 2rem 2rem 1rem;
            margin-top: auto;
            text-align: center;
            border-top: 4px solid #d4af37;
        }
        footer a {
            color: #d4af37;
        }
        footer a:hover {
            background-color: #d4af37;
            color: #1a1a1a;
        }
        footer ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        footer .copyright {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            header {
                padding: 0.8rem 1rem;
                flex-wrap: wrap;
            }
            nav ul {
                display: none;
                flex-direction: column;
                width: 100%;
                background-color: #1a1a1a;
                padding: 1rem 0;
                border-top: 2px solid #d4af37;
                position: absolute;
                top: 100%;
                left: 0;
                z-index: 99;
            }
            nav ul.open {
                display: flex;
            }
            .hamburger-menu {
                display: flex;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .grid-3 {
                grid-template-columns: 1fr 1fr;
            }
            .hero {
                padding: 2rem 1rem;
            }
            .container {
                padding: 0 0.8rem;
            }
        }
        @media (max-width: 480px) {
            .grid-3 {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
